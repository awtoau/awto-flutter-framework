name: awto_flutter_framework
description: >
  A stand-alone Flutter framework providing a best-practice logging system,
  reusable Flutter shape widgets, and a node-based module system for BLE/WiFi
  connectivity with built-in benchmarking and auto-discovery.
version: 0.1.0
homepage: https://github.com/awtoau/awto-flutter-framework

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # logging-related
  intl: ^0.19.0
  # connectivity
  flutter_blue_plus: ^1.31.13
  wifi_scan: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  # No assets or fonts needed for the core framework.
