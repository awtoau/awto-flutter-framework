name: Code Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage-check:
    name: Coverage Threshold Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Get dependencies
        run: |
          cd apps/cli && dart pub get && cd ..
          cd apps/gui && flutter pub get && cd ..
      - name: Generate coverage
        run: cd apps/cli && dart test --coverage=coverage && cd ..
      - name: Check coverage threshold
        run: |
          COVERAGE_FILE="apps/cli/coverage/coverage.lcov"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "Coverage file not found"
            exit 1
          fi

          # Simple coverage check: count covered lines
          COVERED=$(grep -c "^LH:" "$COVERAGE_FILE" || echo "0")
          TOTAL=$(grep -c "^LN:" "$COVERAGE_FILE" || echo "1")

          if [ "$TOTAL" -gt 0 ]; then
            PERCENTAGE=$((COVERED * 100 / TOTAL))
            echo "Coverage: ${PERCENTAGE}% (${COVERED}/${TOTAL})"

            if [ "$PERCENTAGE" -lt 80 ]; then
              echo "❌ Coverage below 80% threshold"
              exit 1
            fi
          fi
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: apps/cli/coverage/coverage.lcov
          flags: unittests
          name: codecov-umbrella

  lint-check:
    name: Linting & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Get dependencies
        run: |
          cd apps/cli && dart pub get && cd ..
          cd apps/gui && flutter pub get && cd ..
      - name: Check formatting
        run: |
          cd apps/cli
          if ! dart format --set-exit-if-changed lib/ test/; then
            echo "❌ Code formatting issues found. Run: dart format -i lib/ test/"
            exit 1
          fi
          cd ..
          cd apps/gui
          if ! dart format --set-exit-if-changed lib/ test/; then
            echo "❌ Code formatting issues found. Run: dart format -i lib/ test/"
            exit 1
          fi
          cd ..
      - name: Analyze code
        run: |
          cd apps/cli
          if ! dart analyze --fatal-infos; then
            echo "❌ Analysis issues found"
            exit 1
          fi
          cd ..
          cd apps/gui
          if ! flutter analyze; then
            echo "❌ Analysis issues found"
            exit 1
          fi
          cd ..

  performance-check:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Get dependencies
        run: |
          cd apps/cli && dart pub get && cd ..
      - name: Measure build time
        run: |
          START=$(date +%s)
          cd apps/cli && dart compile exe lib/main.dart -o build/awto_cli_demo 2>/dev/null || true
          cd ..
          END=$(date +%s)
          BUILD_TIME=$((END - START))
          echo "CLI Build time: ${BUILD_TIME}s"

          if [ "$BUILD_TIME" -gt 60 ]; then
            echo "⚠️  Build time exceeded 60 seconds"
          fi

  security-check:
    name: Security & Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Check for hardcoded secrets
        run: |
          if grep -r "password" apps/ --include="*.dart" | grep -v "// " | grep -v test; then
            echo "❌ Possible hardcoded secret found"
            exit 1
          fi
      - name: Get dependencies
        run: |
          cd apps/cli && dart pub get && cd ..
          cd apps/gui && flutter pub get && cd ..
      - name: Check pubspec for vulnerable packages
        run: |
          echo "Checking for outdated packages..."
          cd apps/cli && dart pub outdated --no-dev-dependencies || true
          cd ..

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Analyze dependencies
        run: |
          echo "=== CLI Dependencies ==="
          cd apps/cli && dart pub deps && cd ..
          echo ""
          echo "=== GUI Dependencies ==="
          cd apps/gui && flutter pub deps && cd ..
      - name: Check for unused imports
        run: |
          echo "Checking for unused imports..."
          cd apps/cli
          if dart analyze | grep "unused_import"; then
            echo "⚠️  Unused imports found"
          fi
          cd ..

status-check:
  name: Quality Gates Status
  runs-on: ubuntu-latest
  needs: [coverage-check, lint-check, performance-check, security-check, dependency-check]
  if: always()
  steps:
    - name: Check status
      run: |
        if [ "${{ needs.coverage-check.result }}" != "success" ]; then
          echo "❌ Coverage check failed"
          exit 1
        fi
        if [ "${{ needs.lint-check.result }}" != "success" ]; then
          echo "❌ Lint check failed"
          exit 1
        fi
        if [ "${{ needs.security-check.result }}" != "success" ]; then
          echo "❌ Security check failed"
          exit 1
        fi
        echo "✓ All quality gates passed"
